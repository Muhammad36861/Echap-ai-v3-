<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Echap AI | 3.1 Ultra Pro</title>
    <style>
        :root { --bg: #0d1117; --sidebar: #161b22; --accent: #238636; --text: #c9d1d9; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid #333; padding: 20px; }
        .main { flex: 1; display: flex; flex-direction: column; }
        .chat-box { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 20px; }
        .msg { padding: 15px; border-radius: 10px; max-width: 80%; line-height: 1.5; }
        .user { align-self: flex-end; background: #057642; color: white; }
        .bot { align-self: flex-start; background: #21262d; border: 1px solid #333; }
        .input-area { padding: 25px; background: var(--sidebar); display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #0d1117; color: white; outline: none; }
        button { background: var(--accent); color: white; border: none; padding: 0 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h2 style="color: var(--accent);">Echap AI</h2>
        <p style="font-size: 12px; opacity: 0.7;">Status: 3.1 Ultra Online</p>
        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
        <div style="font-size: 11px;">D11 Studios Enterprise</div>
    </aside>

    <main class="main">
        <div class="chat-box" id="chatDisplay">
            <div class="msg bot">System Initialized. Echap AI is ready for your prompt, Ashar.</div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Ask 3.1 Ultra something..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">Send</button>
        </div>
    </main>

    <script>
        // --- THE CONST VARIABLE YOU WANTED ---
        const apiKey = "AIzaSyAtwhWB31MwxaDPmfY9kJNGGn54fv6U7mc"; 

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chatDisplay');
            const userText = input.value.trim();

            if (!userText) return;

            // 1. Show User Message
            appendMessage(userText, 'user');
            input.value = "";

            // 2. Show Thinking State
            const thinkingDiv = appendMessage("Echap is analyzing...", 'bot');

            // 3. THE FETCH URL USING YOUR VARIABLE
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${apiKey}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: userText }] }]
                    })
                });

                const data = await response.json();

                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    thinkingDiv.innerText = data.candidates[0].content.parts[0].text;
                } else {
                    thinkingDiv.innerText = "Error: Model refused or Key is invalid.";
                    console.log(data);
                }
            } catch (error) {
                thinkingDiv.innerText = "Connection Error. Check your internet or API Key.";
                console.error(error);
            }
        }

        function appendMessage(text, className) {
            const div = document.createElement('div');
            div.className = `msg ${className}`;
            div.innerText = text;
            chatDisplay.appendChild(div);
            chatDisplay.scrollTop = chatDisplay.scrollHeight;
            return div;
        }
    </script>
</body>
</html>
