<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echap AI | 3.1 Ultra Pro</title>
    <style>
        :root {
            --bg: #0d1117;
            --sidebar: #161b22;
            --chat-bubble: #21262d;
            --accent: #238636; 
            --text: #c9d1d9;
            --user-bubble: #057642;
        }

        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid #30363d; display: flex; flex-direction: column; padding: 20px; }
        .logo { font-size: 24px; font-weight: bold; color: var(--accent); margin-bottom: 30px; }
        .status { font-size: 12px; color: #8b949e; margin-bottom: 20px; }

        /* Main Area */
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        header { padding: 15px 40px; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; background: var(--sidebar); }
        
        .chat-container { flex: 1; overflow-y: auto; padding: 30px 15%; display: flex; flex-direction: column; gap: 20px; }
        .msg { max-width: 85%; padding: 15px 20px; border-radius: 12px; line-height: 1.6; font-size: 15.5px; word-wrap: break-word; }
        .user { align-self: flex-end; background: var(--user-bubble); color: white; }
        .bot { align-self: flex-start; background: var(--chat-bubble); border: 1px solid #30363d; }

        /* Input Bar */
        .input-area { padding: 25px 15%; background: var(--bg); border-top: 1px solid #30363d; }
        .input-wrap { background: var(--sidebar); border: 1px solid #30363d; border-radius: 10px; display: flex; padding: 12px; align-items: center; }
        input { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 16px; padding: 0 10px; }
        button { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #2ea043; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">Echap AI</div>
        <div class="status">● System: 3.1 Ultra Online</div>
        <div style="margin-top: auto; font-size: 11px; opacity: 0.5;">D11 Studios Enterprise</div>
    </aside>

    <main class="main">
        <header>
            <div style="font-weight: bold;">Echap AI 3.1 <span style="color:var(--accent)">ULTRA</span></div>
            <div style="font-size: 13px; color: #8b949e;">Karachi, PK</div>
        </header>

        <div class="chat-container" id="chatDisplay">
            <div class="msg bot">System ready, Ashar. How can I help you with your project tonight?</div>
        </div>

        <div class="input-area">
            <div class="input-wrap">
                <input type="text" id="userInput" placeholder="Message Echap AI..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </main>

    <script>
        // --- YOUR API CONFIGURATION ---
        const apiKey = "AIzaSyAtwhWB31MwxaDPmfY9kJNGGn54fv6U7mc"; 
        // Using Gemini 1.5 Flash to fix the 404 Error
        const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chatDisplay = document.getElementById('chatDisplay');
            const userText = input.value.trim();

            if (!userText) return;

            // 1. Add User Message to UI
            appendMessage(userText, 'user');
            input.value = "";

            // 2. Add Bot "Thinking" State
            const thinkingDiv = appendMessage("Thinking...", 'bot');

            // 3. The API Request
            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: userText }]
                        }]
                    })
                });

                const data = await response.json();

                if (data.candidates && data.candidates[0].content) {
                    // Success: Show the AI's response
                    thinkingDiv.innerText = data.candidates[0].content.parts[0].text;
                } else {
                    // Error: Show what went wrong
                    thinkingDiv.innerText = "Error: " + (data.error ? data.error.message : "API check failed.");
                    console.error("Full Error Data:", data);
                }

            } catch (error) {
                thinkingDiv.innerText = "Network Error: Please check your connection.";
                console.error("Fetch Error:", error);
            }
        }

        function appendMessage(text, className) {
            const div = document.createElement('div');
            div.className = `msg ${className}`;
            div.innerText = text;
            const chat = document.getElementById('chatDisplay');
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }
    </script>
</body>
</html>
