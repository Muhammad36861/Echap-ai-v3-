<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echap AI | 3.1 Ultra Pro</title>
    <style>
        :root {
            --bg: #0d1117; --sidebar: #161b22; --chat-bubble: #21262d;
            --accent: #238636; --text: #c9d1d9; --user-bubble: #057642;
        }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid #30363d; padding: 20px; display: flex; flex-direction: column; }
        .main { flex: 1; display: flex; flex-direction: column; }
        header { padding: 15px 40px; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; background: var(--sidebar); }
        .chat-container { flex: 1; overflow-y: auto; padding: 30px 15%; display: flex; flex-direction: column; gap: 20px; }
        .msg { max-width: 85%; padding: 15px 20px; border-radius: 12px; line-height: 1.6; font-size: 15.5px; word-wrap: break-word; }
        .user { align-self: flex-end; background: var(--user-bubble); color: white; }
        .bot { align-self: flex-start; background: var(--chat-bubble); border: 1px solid #30363d; }
        .input-area { padding: 25px 15%; background: var(--bg); border-top: 1px solid #30363d; }
        .input-wrap { background: var(--sidebar); border: 1px solid #30363d; border-radius: 10px; display: flex; padding: 12px; align-items: center; }
        input { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 16px; padding: 0 10px; }
        button { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div style="font-size: 24px; font-weight: bold; color: var(--accent);">Echap AI</div>
        <div style="font-size: 12px; color: #8b949e; margin-top: 10px;">● System: v3.1 Ultra</div>
    </aside>

    <main class="main">
        <header><div style="font-weight: bold;">Session: Active</div></header>
        <div class="chat-container" id="chatDisplay">
            <div class="msg bot">System ready. How can I assist with your project?</div>
        </div>
        <div class="input-area">
            <div class="input-wrap">
                <input type="text" id="userInput" placeholder="Message..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </main>

    <script>
        // --- API CONFIGURATION ---
        const apiKey = "AIzaSyAtwhWB31MwxaDPmfY9kJNGGn54fv6U7mc"; 
        
        // UPDATED: Using v1 stable endpoint to stop 404 error
        const apiUrl = `https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${apiKey}`;

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chatDisplay = document.getElementById('chatDisplay');
            const userText = input.value.trim();
            if (!userText) return;

            appendMessage(userText, 'user');
            input.value = "";
            const thinkingDiv = appendMessage("Thinking...", 'bot');

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: userText }] }]
                    })
                });

                const data = await response.json();

                if (data.candidates && data.candidates[0].content) {
                    thinkingDiv.innerText = data.candidates[0].content.parts[0].text;
                } else {
                    thinkingDiv.innerText = "Error: Check your API Key settings in Google AI Studio.";
                    console.log("Error Log:", data);
                }
            } catch (error) {
                thinkingDiv.innerText = "Network Error. Please try again.";
            }
        }

        function appendMessage(text, className) {
            const div = document.createElement('div');
            div.className = `msg ${className}`;
            div.innerText = text;
            const chat = document.getElementById('chatDisplay');
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }
    </script>
</body>
</html>
