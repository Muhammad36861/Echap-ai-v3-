<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echap AI | 3.1 Ultra Pro</title>
    <style>
        :root {
            --bg: #0d1117; --sidebar: #161b22; --chat-bubble: #21262d;
            --accent: #238636; --premium: #d29922; --text: #c9d1d9; --user-bubble: #057642;
        }

        body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 280px; background: var(--sidebar); border-right: 1px solid #30363d; display: flex; flex-direction: column; padding: 15px; }
        .new-chat { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
        
        .history { flex: 1; overflow-y: auto; font-size: 13px; }
        .history-item { 
            padding: 10px; border-radius: 6px; cursor: pointer; margin-bottom: 5px; 
            display: flex; justify-content: space-between; align-items: center; border: 1px solid transparent; 
        }
        .history-item:hover { background: #21262d; border-color: #30363d; }
        .history-item.active { background: #21262d; border-color: var(--accent); }
        .del-btn { color: #f85149; font-weight: bold; padding: 0 5px; visibility: hidden; }
        .history-item:hover .del-btn { visibility: visible; }

        /* Main Area */
        .main { flex: 1; display: flex; flex-direction: column; }
        header { padding: 15px 40px; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; background: var(--sidebar); }
        #modeSelect { background: #0d1117; color: white; border: 1px solid #30363d; padding: 8px 15px; border-radius: 20px; outline: none; }

        .chat-container { flex: 1; overflow-y: auto; padding: 40px 15%; display: flex; flex-direction: column; gap: 20px; }
        .msg { max-width: 85%; padding: 15px 20px; border-radius: 12px; line-height: 1.6; font-size: 15.5px; }
        .user { align-self: flex-end; background: var(--user-bubble); color: white; }
        .bot { align-self: flex-start; background: var(--chat-bubble); border: 1px solid #30363d; }

        .input-area { padding: 25px 15%; background: var(--bg); border-top: 1px solid #30363d; }
        .input-wrap { background: var(--sidebar); border: 1px solid #30363d; border-radius: 12px; display: flex; padding: 12px; align-items: center; }
        input { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 16px; padding: 0 10px; }
        .send-btn { background: var(--accent); color: white; border: none; padding: 10px 22px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <button class="new-chat" onclick="createNewChat()">+ New Chat</button>
        <div class="history" id="chatHistoryList"></div>
        <div style="font-size: 10px; color: var(--premium); text-align: center; padding-top: 10px;">D11 Studios Enterprise v2.5</div>
    </aside>

    <main class="main">
        <header>
            <div style="font-weight: bold;">Echap <span style="color:var(--accent)">AI</span> 3.1 ULTRA</div>
            <select id="modeSelect">
                <option value="normal">Normal Mode</option>
                <option value="coder">Coder Mode</option>
                <option value="homework">Homework Mode</option>
            </select>
        </header>
        <div class="chat-container" id="chatBox"></div>
        <div class="input-area">
            <div class="input-wrap">
                <input type="text" id="userInput" placeholder="Type your message..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button class="send-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </main>

    <script>
        const API_KEY = "GEMINI_KEY"; // Will be injected by GitHub
        const chatBox = document.getElementById('chatBox');
        let chats = JSON.parse(localStorage.getItem('echap_chats')) || [];
        let currentChatId = null;

        function init() {
            renderHistory();
            if (chats.length > 0) loadChat(chats[0].id);
            else createNewChat();
        }

        function createNewChat() {
            const newChat = { id: Date.now(), title: "New Chat", messages: [] };
            chats.unshift(newChat);
            save();
            renderHistory();
            loadChat(newChat.id);
        }

        function loadChat(id) {
            currentChatId = id;
            const chat = chats.find(c => c.id === id);
            chatBox.innerHTML = "";
            chat.messages.forEach(m => appendMessage(m.text, m.type, false));
            renderHistory();
        }

        function deleteChat(id, event) {
            event.stopPropagation();
            chats = chats.filter(c => c.id !== id);
            save();
            if (currentChatId === id) {
                if (chats.length > 0) loadChat(chats[0].id);
                else createNewChat();
            } else {
                renderHistory();
            }
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            input.value = "";

            const chat = chats.find(c => c.id === currentChatId);
            if (chat.messages.length === 0) chat.title = text.substring(0, 20) + "...";
            chat.messages.push({ text, type: 'user' });

            const thinking = appendMessage("Echap is analyzing...", 'bot');
            
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${API_KEY}`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text }] }] })
                });
                const data = await response.json();
                const aiMsg = data.candidates[0].content.parts[0].text;
                thinking.innerText = aiMsg;
                chat.messages.push({ text: aiMsg, type: 'bot' });
                save();
            } catch (e) {
                thinking.innerText = "Connection Error. Check API Key.";
            }
        }

        function appendMessage(text, type, shouldScroll = true) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerText = text;
            chatBox.appendChild(div);
            if (shouldScroll) chatBox.scrollTop = chatBox.scrollHeight;
            return div;
        }

        function renderHistory() {
            const list = document.getElementById('chatHistoryList');
            list.innerHTML = "";
            chats.forEach(c => {
                const item = document.createElement('div');
                item.className = `history-item ${c.id === currentChatId ? 'active' : ''}`;
                item.onclick = () => loadChat(c.id);
                item.innerHTML = `<span>${c.title}</span><span class="del-btn" onclick="deleteChat(${c.id}, event)">×</span>`;
                list.appendChild(item);
            });
        }

        function save() { localStorage.setItem('echap_chats', JSON.stringify(chats)); }

        init();
    </script>
</body>
</html>
